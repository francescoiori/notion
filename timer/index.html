<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="timer" id="timer">
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div class="main">
      <div class="left">
        <button class="nudge" id="up">&#9650;</button>
        <div class="clock" id="clock">05:00</div>
        <button class="nudge" id="down">&#9660;</button>
      </div>
      <div class="right">
        <button class="btn green" id="startBtn">Start</button>
        <button class="btn red hidden" id="stopBtn">Stop</button>
        <button class="btn grey" id="resetBtn">Reset</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
